<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Streamer — Remote Browser</title>
  <meta name="description" content="Remote browser control interface for Go Streamer">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="login-title">Go Streamer</h1>
      <p class="login-subtitle">Enter password to continue</p>
      <form id="login-form" autocomplete="off">
        <input type="password" class="login-input" id="login-password" placeholder="Password" autofocus>
        <div class="login-error hidden" id="login-error">Invalid password</div>
        <button type="submit" class="login-btn">Unlock</button>
      </form>
    </div>
  </div>
  <div id="app" class="hidden">
    <div class="tab-bar" id="tab-bar">
      <button class="tab-new" title="New Tab">+</button>
    </div>

    <nav class="navbar">
      <button class="nav-btn" id="btn-back" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-forward" title="Forward">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-reload" title="Reload">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <input type="text" class="url-bar" id="url-bar" placeholder="Enter URL..." autocomplete="off" spellcheck="false">
      <button class="nav-btn" id="btn-settings" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </nav>

    <div class="canvas-container">
      <canvas id="screen"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-content">
          <div class="overlay-spinner"></div>
          <div class="overlay-text">Connecting to browser...</div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-left">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecting...</span>
      </div>
      <div class="status-right">
        <span id="resolution-display">1280×720</span>
        <span id="fps-counter">0 FPS</span>
      </div>
    </div>

    <div class="settings-backdrop hidden" id="settings-backdrop"></div>
    <div class="settings-panel hidden" id="settings-panel">
      <div class="settings-header">
        <h2 class="settings-title">Settings</h2>
        <button class="settings-close" id="settings-close">×</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <label class="settings-label">Screen Resolution</label>
          <div class="resolution-presets" id="resolution-presets">
            <button class="preset-btn" data-w="1920" data-h="1080">1920×1080</button>
            <button class="preset-btn" data-w="1280" data-h="720">1280×720</button>
            <button class="preset-btn" data-w="1024" data-h="768">1024×768</button>
            <button class="preset-btn" data-w="854" data-h="480">854×480</button>
            <button class="preset-btn" data-w="640" data-h="360">640×360</button>
          </div>
        </div>
        <div class="settings-section">
          <label class="settings-label">Custom Resolution</label>
          <div class="custom-resolution">
            <input type="number" class="res-input" id="custom-width" placeholder="Width" min="320" max="3840">
            <span class="res-separator">×</span>
            <input type="number" class="res-input" id="custom-height" placeholder="Height" min="240" max="2160">
            <button class="apply-btn" id="apply-resolution">Apply</button>
          </div>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-section">
          <div class="settings-label-row">
            <label class="settings-label">Discord Streaming</label>
            <button class="refresh-btn" id="discord-refresh" title="Refresh servers">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
          </div>
          <div class="discord-status" id="discord-status"></div>
          <div class="settings-field">
            <label class="field-label">Server</label>
            <select class="settings-select" id="discord-guild">
              <option value="">Select a server...</option>
            </select>
          </div>
          <div class="settings-field">
            <label class="field-label">Voice Channel</label>
            <select class="settings-select" id="discord-channel" disabled>
              <option value="">Select a channel...</option>
            </select>
          </div>
          <button class="stream-btn" id="discord-stream-btn" disabled>Start Streaming</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
